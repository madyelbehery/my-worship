<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>TRACKING</title>
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<style>
  body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; direction: rtl; user-select: none; -webkit-tap-highlight-color: transparent; }
  
  /* شاشة الدخول */
  #lockScreen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
  .login-box { display: flex; flex-direction: column; gap: 12px; width: 250px; }
  #lockScreen input { padding: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: #fff; text-align: center; outline: none; }
  #lockScreen button { padding: 12px; border-radius: 10px; border: none; background: #4caf50; font-weight: bold; cursor: pointer; }
  
  .header { text-align: center; padding: 20px; font-size: 24px; font-weight: bold; color: #4caf50; }
  .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 10px; max-width: 450px; margin: 0 auto; }
  
  .day { 
    width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
    cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; border: 2px solid #222; 
    color: #fff; 
  }

  /* الإطار الأزرق للقرآن فقط */
  .quran-border { border-color: #2196f3 !important; box-shadow: 0 0 8px #2196f3; }
  
  /* لون الرقم أحمر عند فعل العادة */
  .habit-active { color: #ff5252 !important; text-shadow: 0 0 5px rgba(255, 82, 82, 0.5); }

  .day.today { outline: 2px solid #fff; outline-offset: 3px; }
  
  .stats-container { max-width: 90%; margin: 10px auto; padding: 15px; background: #111; border-radius: 15px; border: 1px solid #222; }
  .stat-label { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; font-weight: bold; }
  .progress-bg { background: #222; height: 10px; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
  .progress-fill { height: 100%; transition: width 0.6s ease; }
  
  .data-management { text-align: center; margin-top: 20px; padding-bottom: 30px; }
  .btn-data { background: #222; color: #888; border: 1px solid #333; padding: 8px 15px; border-radius: 8px; font-size: 11px; cursor: pointer; margin: 5px; }
  
  /* Popup */
  .popup { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(8px); }
  .popup-content { background: #1a1a1a; padding: 20px; border-radius: 20px; width: 85%; max-width: 300px; text-align: center; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; border: 1px solid #333; animation: fadeIn 0.4s; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  
  .popup-circle { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; background: #2a2a2a; transition: 0.2s; }
  .popup-circle:active { transform: scale(0.85); }
  .active-prayer { background: #4caf50; color: #000; font-weight: bold; }
  .active-habit { background: #e53935; color: #fff; font-weight: bold; }

  /* قسم القرآن */
  .quran-section { width: 100%; background: #222; padding: 10px; border-radius: 12px; margin-top: 5px; border: 1px solid #2196f3; }
  .quran-section input { width: 28%; padding: 8px; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; text-align: center; font-size: 12px; margin-top: 5px; }
  .quran-section h4 { margin: 0 0 5px 0; font-size: 14px; color: #2196f3; }

  .btn-save { background: #4caf50; color: #000; width: 100%; padding: 12px; border: none; border-radius: 12px; margin-top: 10px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>

<div id="lockScreen">
  <div style="font-size:22px; color:#4caf50; font-weight:bold;">نظام المتابعة الخاص</div>
  <div class="login-box">
    <input type="text" id="userInput" placeholder="اسم المستخدم">
    <input type="password" id="passInput" placeholder="كلمة السر">
    <button onclick="checkLogin()">فتح النظام</button>
  </div>
  <div id="loginError" style="color:#e53935; font-size:14px; display:none;">⚠️ خطأ في البيانات</div>
</div>

<div id="mainContent" style="display:none;">
  <div class="header" id="monthTitle"></div>
  <div class="calendar" id="calendar"></div>

  <div class="stats-container">
    <div class="stat-label"><span>الصلوات (حتى الآن)</span><span id="prayerPercent">0%</span></div>
    <div class="progress-bg"><div id="prayerBar" class="progress-fill" style="background:#4caf50; width:0%"></div></div>
    
    <div class="stat-label"><span>الالتزام بالعادات</span><span id="habitPercent">0%</span></div>
    <div class="progress-bg"><div id="habitBar" class="progress-fill" style="background:#e53935; width:0%"></div></div>
  </div>

  <div class="data-management">
    <button class="btn-data" onclick="exportData()">📤 نسخ نسخة احتياطية</button>
    <button class="btn-data" onclick="importData()">📥 استرجاع البيانات</button>
  </div>

  <div class="popup" id="popup">
    <div class="popup-content">
      <div id="popupDate" style="width:100%; color:#4caf50; font-weight:bold;"></div>
      
      <div id="circlesArea" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;"></div>

      <div class="quran-section">
        <h4>📖 ورد القرآن الكريم</h4>
        <input type="text" id="quranSurah" placeholder="السورة">
        <input type="number" id="quranFrom" placeholder="من">
        <input type="number" id="quranTo" placeholder="إلى">
      </div>

      <button class="btn-save" onclick="saveAndClose()">حفظ وإغلاق</button>
    </div>
  </div>
</div>

<script>
const CORRECT_USER = "mohamed", CORRECT_PASS = "****";
let currentOpenDate = "";

function checkLogin() {
  if(document.getElementById("userInput").value === CORRECT_USER && document.getElementById("passInput").value === CORRECT_PASS) {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
    loadCalendar();
  } else { document.getElementById("loginError").style.display="block"; }
}

document.addEventListener('keypress', (e) => { if(e.key === 'Enter') checkLogin(); });

const now = new Date(), year = now.getFullYear(), month = now.getMonth(), todayDate = now.getDate(), currentHour = now.getHours();
const prayerSchedule = [
  {key:"fajr", h:4, n:"فجر"}, {key:"zuhr", h:12, n:"ظهر"}, {key:"asr", h:15, n:"عصر"}, {key:"maghrib", h:18, n:"مغرب"}, {key:"isha", h:19, n:"عشاء"}
];

function getData(dateStr) {
  const saved = localStorage.getItem(dateStr);
  return saved ? JSON.parse(saved) : { prayer: {}, habit: false, quran: {s:"", f:"", t:""} };
}

function loadCalendar() {
  const cal = document.getElementById("calendar"), days = new Date(year, month + 1, 0).getDate();
  document.getElementById("monthTitle").innerText = now.toLocaleString("ar", { month: "long", year: "numeric" });
  cal.innerHTML = "";
  for (let d = 1; d <= days; d++) {
    const dStr = `d-${year}-${month+1}-${d}`, data = getData(dStr), div = document.createElement("div");
    div.className = "day"; div.innerText = d;
    if (d === todayDate) div.classList.add("today");
    
    let cols = [];
    prayerSchedule.forEach((p, i) => cols.push(`${data.prayer[p.key] ? "#4caf50" : "#222"} ${i*72}deg ${(i+1)*72}deg`));
    div.style.background = `conic-gradient(${cols.join(',')})`;
    
    if (data.quran && data.quran.s !== "") div.classList.add("quran-border");
    if (data.habit) div.classList.add("habit-active");
    
    div.onclick = () => openPopup(dStr, d);
    cal.appendChild(div);
  }
  updateStats();
}

function openPopup(dateStr, dNum) {
  currentOpenDate = dateStr;
  const data = getData(dateStr);
  document.getElementById("popupDate").innerText = `يوم ${dNum}`;
  
  const area = document.getElementById("circlesArea");
  area.innerHTML = "";
  
  prayerSchedule.forEach(p => {
    const b = document.createElement("div");
    b.className = "popup-circle" + (data.prayer[p.key] ? " active-prayer" : "");
    b.innerText = p.n;
    b.onclick = () => { data.prayer[p.key] = !data.prayer[p.key]; saveInternal(dateStr, data); openPopup(dateStr, dNum); };
    area.appendChild(b);
  });

  const hB = document.createElement("div");
  hB.className = "popup-circle" + (data.habit ? " active-habit" : "");
  hB.innerText = "عادة";
  hB.onclick = () => { data.habit = !data.habit; saveInternal(dateStr, data); openPopup(dateStr, dNum); };
  area.appendChild(hB);

  document.getElementById("quranSurah").value = data.quran?.s || "";
  document.getElementById("quranFrom").value = data.quran?.f || "";
  document.getElementById("quranTo").value = data.quran?.t || "";

  document.getElementById("popup").style.display = "flex";
}

function saveInternal(dateStr, data) {
  localStorage.setItem(dateStr, JSON.stringify(data));
  updateStats();
}

function saveAndClose() {
  const data = getData(currentOpenDate);
  data.quran = {
    s: document.getElementById("quranSurah").value,
    f: document.getElementById("quranFrom").value,
    t: document.getElementById("quranTo").value
  };
  localStorage.setItem(currentOpenDate, JSON.stringify(data));
  document.getElementById("popup").style.display = "none";
  loadCalendar();
}

function updateStats() {
  let totalDue = 0, doneP = 0, doneH = 0;
  for (let d = 1; d <= todayDate; d++) {
    const data = getData(`d-${year}-${month+1}-${d}`);
    prayerSchedule.forEach(p => {
      if (d < todayDate || (d === todayDate && currentHour >= p.h)) {
        totalDue++; if (data.prayer[p.key]) doneP++;
      }
    });
    if (data.habit) doneH++;
  }
  const pR = totalDue > 0 ? Math.round((doneP/totalDue)*100) : 0;
  const hR = Math.round((doneH/todayDate)*100);
  document.getElementById("prayerBar").style.width = pR+"%";
  document.getElementById("prayerPercent").innerText = pR+"%";
  document.getElementById("habitBar").style.width = hR+"%";
  document.getElementById("habitPercent").innerText = hR+"%";
}

function exportData() {
  const allData = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('d-')) allData[key] = localStorage.getItem(key);
  }
  const blob = new Blob([JSON.stringify(allData)], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `backup_${year}_${month+1}.json`;
  a.click();
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = readerEvent => {
      const content = JSON.parse(readerEvent.target.result);
      Object.keys(content).forEach(key => localStorage.setItem(key, content[key]));
      location.reload();
    }
    reader.readAsText(file);
  }
  input.click();
}
</script>
</body>
</html>
